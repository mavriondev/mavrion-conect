version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: b2b_user
      POSTGRES_PASSWORD: b2b_password
      POSTGRES_DB: b2b_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgres://b2b_user:b2b_password@db:5432/b2b_db
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: verysecret
      NODE_ENV: production
    depends_on:
      - db
      - redis
    command: npm run start

volumes:
  postgres_data:
